name: Feature request
description: Propose an API, algorithm, docs, or workflow improvement.
title: '[Feature]: '
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem statement
      description: What workflow or limitation are you trying to address?
      placeholder: Describe the gap in the current package.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed change
      description: Explain the API, behavior, or documentation change you want.
      placeholder: Describe the change as concretely as possible.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: What are you doing today instead, and why is it insufficient?