name: CompatHelper

on:
    schedule:
        - cron: "0 6 * * 1"
    workflow_dispatch:

permissions:
    contents: write
    pull-requests: write

jobs:
    compathelper:
        runs-on: ubuntu-latest
        steps:
            - uses: julia-actions/setup-julia@v2
              with:
                  version: "1"

            - name: Run CompatHelper
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                  COMPATHELPER_PRIV: ${{ secrets.DOCUMENTER_KEY }}
              run: |
                  julia --color=yes -e 'using Pkg; Pkg.add(name="CompatHelper"); using CompatHelper; CompatHelper.main()'
